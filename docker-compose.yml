name: ratio-app

services:
  mysql:
    image: mysql:9.7.0
    container_name: ratio-app-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ratio_app
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
      - ./docker/mysql/conf.d:/etc/mysql/conf.d:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── meta Phase 2 infra ──────────────────────────────────────────────────
  # Events queue (SQS-compatible). The backend auto-creates meta-capi +
  # meta-capi-dlq on boot. Matches SQS_ENDPOINT=http://localhost:9324 in .env.
  elasticmq:
    image: softwaremill/elasticmq-native:1.6.11
    container_name: ratio-app-elasticmq
    restart: unless-stopped
    ports:
      - "9324:9324"
      - "9325:9325"

  # Cache / webhook idempotency. Matches REDIS_URL=redis://localhost:6385.
  # Host port 6385 avoids clashing with any native Redis on 6379.
  redis:
    image: redis:7-alpine
    container_name: ratio-app-redis
    restart: unless-stopped
    ports:
      - "6385:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: ratio-app-backend:dev
    container_name: ratio-app-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file: .env
    environment:
      # API-only: the backend serves no static UI (admin deployed separately).
      SERVE_STATIC: "false"
      # Point each module at the compose mysql service (host `mysql`, not
      # localhost). Add a RATIO_<SLUG>_DATABASE_URL line per scaffolded vendor.
      RATIO_GOOGLE_DATABASE_URL: mysql://app:app@mysql:3306/google_app
      RATIO_META_DATABASE_URL: mysql://app:app@mysql:3306/meta_app
      RATIO_POSTHOG_DATABASE_URL: mysql://app:app@mysql:3306/posthog_app
      RATIO_MOENGAGE_DATABASE_URL: mysql://app:app@mysql:3306/moengage_app
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/ready"]
      interval: 10s
      timeout: 3s
      start_period: 20s
      retries: 3

volumes:
  mysql_data:
