name: ratio-app

services:
  mysql:
    image: mysql:9.7.0
    container_name: ratio-app-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ratio_app
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
      - ./docker/mysql/conf.d:/etc/mysql/conf.d:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ratio-app-redis
    restart: unless-stopped
    command: ["redis-server", "--port", "6385"]
    ports:
      - "6385:6385"
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6385", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  elasticmq:
    image: softwaremill/elasticmq-native:latest
    container_name: ratio-app-elasticmq
    restart: unless-stopped
    ports:
      - "9324:9324"
      - "9325:9325"
    # No healthcheck: the elasticmq-native image is a minimal GraalVM binary with
    # no shell/wget/curl, so any exec-based check fails (reads "unhealthy" even
    # though the broker is up). The backend gates on `service_started` instead.

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: ratio-app-backend:dev
    container_name: ratio-app-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticmq:
        condition: service_started
    env_file: .env
    environment:
      # Pin the in-container port to 3000 (matches the ports + healthcheck below)
      # regardless of PORT in .env (which may be set for a host/server deploy).
      PORT: "3000"
      # API-only: the backend serves no static UI (admin deployed separately).
      SERVE_STATIC: "false"
      # Point each module at the compose mysql service (host `mysql`, not
      # localhost). Add a RATIO_<SLUG>_DATABASE_URL line per scaffolded vendor.
      RATIO_GOOGLE_DATABASE_URL: mysql://app:app@mysql:3306/google_app
      RATIO_META_DATABASE_URL: mysql://app:app@mysql:3306/meta_app
      RATIO_POSTHOG_DATABASE_URL: mysql://app:app@mysql:3306/posthog_app
      RATIO_MOENGAGE_DATABASE_URL: mysql://app:app@mysql:3306/moengage_app
      RATIO_WIZZY_DATABASE_URL: mysql://app:app@mysql:3306/wizzy_app
      RATIO_LOYALTY_DATABASE_URL: mysql://app:app@mysql:3306/loyalty_app
      # Inside the compose network, reach the broker/cache by SERVICE NAME, not
      # localhost (127.0.0.1 inside the container is the container itself). These
      # override the localhost values in .env, which are correct only for a
      # backend run as a local host process.
      SQS_ENDPOINT: http://elasticmq:9324
      REDIS_URL: redis://redis:6385
      # loyalty bulk-ops + exports consumers and the daily-snapshot tick. Safe
      # to run in the single compose backend (consumers idempotent, snapshot
      # Redis-locked). Exports need S3 — set LOYALTY_EXPORT_S3_BUCKET + an
      # S3_ENDPOINT (e.g. a MinIO service) in .env to exercise them locally.
      LOYALTY_WORKER_ENABLED: "true"
      WEBHOOK_SIGNATURE_OPTIONAL: "true"
      # Fallback storefront domain for GMC product links when a merchant hasn't
      # set one in the admin (config "Store URL"). MUST match the store verified
      # in Merchant Center, or GMC flags "Mismatched online store URL". Uncomment
      # and set to your sandbox's verified domain to make products eligible to show.
      # GMC_STORE_URL: "shop.yourstore.com"
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/ready"]
      interval: 10s
      timeout: 3s
      start_period: 20s
      retries: 3

volumes:
  mysql_data:
