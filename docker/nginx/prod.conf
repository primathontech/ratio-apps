# docker/nginx/prod.conf — prefix → per-module service. /live & /ready are internal.
upstream svc_google   { server svc-google:3000;   keepalive 32; }
upstream svc_meta     { server svc-meta:3000;     keepalive 32; }
upstream svc_posthog  { server svc-posthog:3000;  keepalive 32; }
upstream svc_moengage { server svc-moengage:3000; keepalive 32; }

map $request_uri $backend {
  ~^/google/   svc_google;
  ~^/meta/     svc_meta;
  ~^/posthog/  svc_posthog;
  ~^/moengage/ svc_moengage;
  default      svc_google;   # no catch-all module; default keeps nginx valid
}

server {
  listen 80;
  client_max_body_size 2m;

  # Health probes are internal-only — never exposed publicly.
  location = /live  { return 404; }
  location = /ready { return 404; }

  location / {
    proxy_pass http://$backend;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 3s;
    proxy_read_timeout 30s;
  }
}
